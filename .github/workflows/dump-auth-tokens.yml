name: Dump auth_tokens from D1

on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Query auth_tokens via D1 HTTP API
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_D1_ID: "0d26e1f3-d0ee-41f5-bd8b-f1f04b72fa99"
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/d1/database/${CF_D1_ID}/query" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"sql":"SELECT * FROM auth_tokens"}')
          echo "$RESPONSE" > auth_tokens.json

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-tokens
          path: auth_tokens.json
          retention-days: 1
