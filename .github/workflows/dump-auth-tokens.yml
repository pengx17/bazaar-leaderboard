name: Dump auth_tokens from D1

on:
  workflow_dispatch:

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - name: Query auth_tokens via D1 HTTP API
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_D1_ID: ${{ secrets.D1_DATABASE_ID }}
        run: |
          echo "Account ID prefix: ${CF_ACCOUNT_ID:0:8}"
          echo "D1 ID prefix: ${CF_D1_ID:0:8}"
          echo "Wrangler.toml D1 ID prefix: 0d26e1f3"

          # Try with secret D1 ID first
          RESPONSE=$(curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/d1/database/${CF_D1_ID}/query" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"sql":"SELECT * FROM auth_tokens"}')
          echo "$RESPONSE" > auth_tokens.json

          # If that failed, try with wrangler.toml D1 ID
          if echo "$RESPONSE" | grep -q '"success":false'; then
            echo "First attempt failed, trying wrangler.toml D1 ID..."
            RESPONSE2=$(curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/d1/database/0d26e1f3-d0ee-41f5-bd8b-f1f04b72fa99/query" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"sql":"SELECT * FROM auth_tokens"}')
            echo "$RESPONSE2" > auth_tokens_fallback.json
          fi

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: auth-tokens
          path: |
            auth_tokens.json
            auth_tokens_fallback.json
          retention-days: 1
